<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e9c46a;stop-opacity:0.15"/>
      <stop offset="50%" style="stop-color:#789d8e;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#e9c46a;stop-opacity:0.2"/>
    </linearGradient>
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#789d8e" opacity="0.3"/>
    </pattern>
    <linearGradient id="line1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e9c46a;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#e9c46a;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#e9c46a;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="line2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#789d8e;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#789d8e;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#789d8e;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="#f8faf8"/>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#dots)"/>
  <!-- Abstract geometric lines -->
  <line x1="200" y1="100" x2="900" y2="500" stroke="url(#line1)" stroke-width="1.5"/>
  <line x1="400" y1="200" x2="1200" y2="700" stroke="url(#line1)" stroke-width="1"/>
  <line x1="100" y1="300" x2="700" y2="900" stroke="url(#line2)" stroke-width="1.5"/>
  <line x1="600" y1="50" x2="1400" y2="600" stroke="url(#line1)" stroke-width="1"/>
  <line x1="800" y1="150" x2="1600" y2="800" stroke="url(#line2)" stroke-width="1"/>
  <!-- Geometric shapes -->
  <rect x="700" y="300" width="200" height="200" rx="20" fill="none" stroke="#e9c46a" stroke-width="1" opacity="0.15" transform="rotate(15 800 400)"/>
  <rect x="1100" y="200" width="150" height="150" rx="15" fill="none" stroke="#789d8e" stroke-width="1" opacity="0.12" transform="rotate(-10 1175 275)"/>
  <circle cx="1400" cy="400" r="120" fill="none" stroke="#e9c46a" stroke-width="1" opacity="0.1"/>
  <circle cx="500" cy="600" r="80" fill="none" stroke="#789d8e" stroke-width="1" opacity="0.12"/>
  <!-- Dashboard UI mockup elements -->
  <rect x="900" y="250" width="500" height="320" rx="12" fill="white" opacity="0.4" stroke="#e9c46a" stroke-width="1" stroke-opacity="0.2"/>
  <rect x="920" y="270" width="120" height="8" rx="4" fill="#789d8e" opacity="0.2"/>
  <rect x="920" y="290" width="460" height="1" fill="#e9c46a" opacity="0.15"/>
  <rect x="920" y="310" width="200" height="120" rx="8" fill="#e9c46a" opacity="0.08"/>
  <rect x="1140" y="310" width="220" height="55" rx="6" fill="#789d8e" opacity="0.06"/>
  <rect x="1140" y="375" width="220" height="55" rx="6" fill="#e9c46a" opacity="0.06"/>
  <rect x="920" y="450" width="460" height="8" rx="4" fill="#789d8e" opacity="0.1"/>
  <rect x="920" y="470" width="380" height="8" rx="4" fill="#789d8e" opacity="0.07"/>
  <rect x="920" y="490" width="420" height="8" rx="4" fill="#789d8e" opacity="0.07"/>
  <rect x="920" y="510" width="300" height="8" rx="4" fill="#789d8e" opacity="0.07"/>
</svg>
